name: 'Setup Node + pnpm'
description: 'Setup Node 22 + pnpm + GitHub Packages registry com cache padrao GameHunter'

inputs:
  node-version:
    description: 'Node version (default 22)'
    required: false
    default: '22'
  scope:
    description: 'npm scope (default @gamehunter-com-br)'
    required: false
    default: '@gamehunter-com-br'
  registry-url:
    description: 'npm registry URL'
    required: false
    default: 'https://npm.pkg.github.com'
  cache:
    description: 'Cache strategy (default pnpm) — pass-through pra setup-node'
    required: false
    default: 'pnpm'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache }}
        registry-url: ${{ inputs.registry-url }}
        scope: ${{ inputs.scope }}
