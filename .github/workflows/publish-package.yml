name: Publish Package (reusable)

# Reusable workflow que publica package npm no GitHub Packages quando
# tag vX.Y.Z e pushada. Substitui copia quase-identica em 4 libs:
# contracts, api-client, integrations, scrapers (4 x ~42 LoC = 168 LoC
# duplicadas reduzidas a este unico arquivo).
#
# Design (gamehunter-design) usa workflow proprio (Changesets + Turbo
# + monorepo) — nao migrado pra este reusable.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node version to setup'
        required: false
        default: '22'
        type: string
      runner:
        description: 'GitHub Actions runner label'
        required: false
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      build-command:
        description: 'Build command (executed before publish)'
        required: false
        default: 'npm run build'
        type: string
      publish-command:
        description: 'Publish command'
        required: false
        default: 'npm publish'
        type: string
      needs-cross-repo-deps:
        description: 'Set true if package depends on other @gamehunter-com-br/* packages (uses NPM_PACKAGES_READ_TOKEN for npm ci)'
        required: false
        default: false
        type: boolean
    secrets:
      NPM_PACKAGES_READ_TOKEN:
        description: 'PAT com read:packages — required quando needs-cross-repo-deps=true'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Require release tag on main
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GH compare API: 'identical' = TAG == main HEAD; 'behind' = TAG eh
          # ancestor de main. Substitui git fetch + merge-base (~5-8s -> ~1s,
          # elimina necessidade de fetch-depth: 0).
          STATUS=$(gh api "/repos/${GITHUB_REPOSITORY}/compare/main...${GITHUB_SHA}" --jq '.status')
          if [[ "$STATUS" != "behind" && "$STATUS" != "identical" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not reachable from origin/main (compare status: $STATUS). Merge this commit to main, then recreate or promote the tag from main."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@gamehunter-com-br'
          cache: npm

      - name: Read package metadata
        id: package
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json'); if(!p.name||!p.version) throw new Error('package.json must define name and version'); console.log('name='+p.name); console.log('version='+p.version)" >> "$GITHUB_OUTPUT"

      - name: Check package version availability
        id: publish-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG="${{ steps.package.outputs.name }}"
          VERSION="${{ steps.package.outputs.version }}"
          if npm view "${PKG}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG}@${VERSION} already exists in GitHub Packages; skipping build and publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps (cross-repo)
        if: ${{ inputs.needs-cross-repo-deps && steps.publish-check.outputs.already_published != 'true' }}
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGES_READ_TOKEN }}

      - name: Install deps (no cross-repo)
        if: ${{ !inputs.needs-cross-repo-deps && steps.publish-check.outputs.already_published != 'true' }}
        run: npm ci

      - name: Build
        if: steps.publish-check.outputs.already_published != 'true'
        run: ${{ inputs.build-command }}

      - name: Publish
        if: steps.publish-check.outputs.already_published != 'true'
        run: ${{ inputs.publish-command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.publish-check.outputs.already_published == 'true'
        run: |
          echo "## Publish skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}\` already exists in GitHub Packages." >> "$GITHUB_STEP_SUMMARY"
