name: Promote Release (reusable)

# Reusable workflow que cria proxima tag semver a partir do ultimo
# vX.Y.Z existente. Consumido pelos 8 repos do ecossistema GameHunter
# via `uses: gamehunter-com-br/.github/.github/workflows/promote-release.yml@v1`.
#
# Substitui copia byte-identica do `promote-release.yml` em cada repo
# (8 x 105 LoC = 840 LoC duplicadas reduzidas a este unico arquivo).

on:
  workflow_call:
    inputs:
      bump:
        description: 'Semver bump (patch/minor/major) a aplicar sobre o ultimo vX.Y.Z'
        required: true
        type: string
      ref:
        description: 'Branch ou SHA pra tagar (deve ser ancestor de main)'
        required: false
        default: main
        type: string
      runner:
        description: 'GitHub Actions runner label'
        required: false
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
    secrets:
      RELEASE_TAG_TOKEN:
        description: 'PAT com contents:write que dispara workflows downstream (GITHUB_TOKEN nao dispara)'
        required: true

permissions:
  contents: read

concurrency:
  group: promote-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag:
    name: Create next semver tag
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Require release token
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          if [ -z "$RELEASE_TAG_TOKEN" ]; then
            echo "::error::Configure RELEASE_TAG_TOKEN with permission to push tags. Tags pushed with GITHUB_TOKEN do not trigger downstream workflows."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require release ref on main
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --force "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Release ref '${{ inputs.ref }}' is not reachable from origin/main. Merge this commit to main, then promote the release tag from main."
            exit 1
          fi

      - name: Compute next tag
        id: next
        env:
          BUMP: ${{ inputs.bump }}
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags --force "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          latest="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          latest="${latest:-v0.0.0}"
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$BUMP" in
            patch) patch=$((patch + 1)) ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            major) major=$((major + 1)); minor=0; patch=0 ;;
            *) echo "::error::Invalid bump '$BUMP'"; exit 1 ;;
          esac

          next="v${major}.${minor}.${patch}"
          if git rev-parse -q --verify "refs/tags/${next}" >/dev/null; then
            echo "::error::Tag ${next} already exists"
            exit 1
          fi

          echo "latest=${latest}" >> "$GITHUB_OUTPUT"
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
          NEXT_TAG: ${{ steps.next.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "Release $NEXT_TAG"
          git push "https://x-access-token:${RELEASE_TAG_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${NEXT_TAG}"

      - name: Summary
        run: |
          echo "## Release promoted" >> "$GITHUB_STEP_SUMMARY"
          echo "- Previous tag: \`${{ steps.next.outputs.latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- New tag: \`${{ steps.next.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tagged SHA: \`${{ steps.next.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
