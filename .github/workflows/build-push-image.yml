name: Build & push image (reusable)

# Reusable workflow que builda imagem Docker e publica em ghcr.io.
# Substitui copia (~95 LoC) em backend, frontend, admin (3 x ~95 = 285 LoC
# duplicados reduzidos a este unico arquivo).

on:
  workflow_call:
    inputs:
      runner:
        description: 'GitHub Actions runner label'
        required: false
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        default: Dockerfile
        type: string
      context:
        description: 'Build context dir'
        required: false
        default: .
        type: string
      extra-build-args:
        description: 'Build args adicionais (multi-line, KEY=VALUE format).'
        required: false
        default: ''
        type: string
    secrets:
      NPM_PACKAGES_READ_TOKEN:
        description: 'PAT com read:packages pra cross-repo deps. Fallback pra GITHUB_TOKEN.'
        required: false
      SENTRY_AUTH_TOKEN:
        description: 'Sentry auth token (project:releases) pra upload de sourcemaps no build. Opcional; vazio = sem upload (withSentryConfig fica silent, build segue verde).'
        required: false
    outputs:
      image:
        description: 'Normalized GHCR image repository'
        value: ${{ jobs.build_push.outputs.image }}
      image_tag:
        description: 'Primary image tag published by this run'
        value: ${{ jobs.build_push.outputs.image_tag }}
      git_sha:
        description: 'Full Git commit recorded in the OCI image'
        value: ${{ jobs.build_push.outputs.git_sha }}
      image_digest:
        description: 'Immutable sha256 registry digest of the primary tag'
        value: ${{ jobs.build_push.outputs.image_digest }}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_push:
    runs-on: ${{ inputs.runner }}
    outputs:
      image: ${{ steps.published-identity.outputs.image }}
      image_tag: ${{ steps.published-identity.outputs.image_tag }}
      git_sha: ${{ steps.published-identity.outputs.git_sha }}
      image_digest: ${{ steps.published-identity.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Require release tag on main
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GH compare API: 'identical' = TAG aponta pro mesmo commit que main HEAD;
          # 'behind' = TAG eh ancestor de main. Qualquer outro ('ahead', 'diverged')
          # = TAG nao esta em main -> reject. Substitui git fetch + merge-base
          # (~5-8s -> ~1s, e elimina necessidade de fetch-depth: 0).
          STATUS=$(gh api "/repos/${GITHUB_REPOSITORY}/compare/main...${GITHUB_SHA}" --jq '.status')
          if [[ "$STATUS" != "behind" && "$STATUS" != "identical" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not reachable from origin/main (compare status: $STATUS). Merge this commit to main, then recreate or promote the tag from main."
            exit 1
          fi

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAGS="${IMAGE}:${REF_NAME},${IMAGE}:sha-${SHORT_SHA}"
            PRIMARY_TAG="$REF_NAME"
            DEPLOY_TARGET="production"
          elif [[ "$GITHUB_REF_NAME" == "main" ]]; then
            TAGS="${IMAGE}:main-latest,${IMAGE}:sha-${SHORT_SHA}"
            PRIMARY_TAG="main-latest"
            DEPLOY_TARGET="staging"
          else
            TAGS="${IMAGE}:sha-${SHORT_SHA}"
            PRIMARY_TAG="sha-${SHORT_SHA}"
            DEPLOY_TARGET="preview"
          fi

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "primary_tag=${PRIMARY_TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "deploy_target=${DEPLOY_TARGET}" >> $GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" | tr ',' '\n' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Skip rebuild quando tag aponta pra SHA ja publicada por build manual ou
      # por uma execucao anterior. Nesse caso so adicionamos a nova tag ao
      # manifest existente via crane (~3s, sem download da imagem).
      - name: Check if SHA image already exists (tag-only fast path)
        id: skip
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG="${GITHUB_REPOSITORY##*/}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          if gh api "/orgs/${{ github.repository_owner }}/packages/container/$PKG/versions?per_page=100" \
                --jq '.[].metadata.container.tags[]' 2>/dev/null \
                | grep -qx "sha-$SHORT_SHA"; then
            echo "already_built=true" >> $GITHUB_OUTPUT
            echo "::notice::Image sha-$SHORT_SHA already published — skipping rebuild, tag-only path"
          else
            echo "already_built=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.skip.outputs.already_built != 'true'

      - name: Login to ghcr.io
        if: steps.skip.outputs.already_built != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-image
        if: steps.skip.outputs.already_built != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max
          build-args: |
            NODE_AUTH_TOKEN=${{ secrets.NPM_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            ${{ inputs.extra-build-args }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.version=${{ github.ref_name }}

      # Tag-only path: SHA ja existe, so adiciona nova tag ao manifest sem
      # rebuildar. Crane faz isso via Registry API (sem download da imagem).
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Tag-only push (image already built)
        if: steps.skip.outputs.already_built == 'true'
        env:
          GH_TOKEN_FOR_REGISTRY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN_FOR_REGISTRY" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          crane tag "${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}" "${{ github.ref_name }}"
          echo "::notice::Tagged ${{ github.ref_name }} -> sha-${{ steps.meta.outputs.short_sha }} via crane (no rebuild)"

      - name: Resolve and verify published image identity
        id: published-identity
        env:
          EXPECTED_GIT_SHA: ${{ github.sha }}
          GH_TOKEN_FOR_REGISTRY: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.primary_tag }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN_FOR_REGISTRY" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

          IMAGE_DIGEST=$(crane digest "$IMAGE:$IMAGE_TAG")
          OCI_REVISION=$(crane config "$IMAGE:$IMAGE_TAG" \
            | jq -r '.config.Labels["org.opencontainers.image.revision"] // empty')

          if [[ ! "$EXPECTED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Expected Git SHA is not a full lowercase SHA-1"
            exit 1
          fi
          if [ "$OCI_REVISION" != "$EXPECTED_GIT_SHA" ]; then
            echo "::error::Published image OCI revision does not match the triggering commit"
            exit 1
          fi
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Published image is missing a valid immutable digest"
            exit 1
          fi

          {
            echo "image=$IMAGE"
            echo "image_tag=$IMAGE_TAG"
            echo "git_sha=$EXPECTED_GIT_SHA"
            echo "image_digest=$IMAGE_DIGEST"
          } >> "$GITHUB_OUTPUT"

          jq -n \
            --arg schema_version "1" \
            --arg image "$IMAGE" \
            --arg image_tag "$IMAGE_TAG" \
            --arg git_sha "$EXPECTED_GIT_SHA" \
            --arg image_digest "$IMAGE_DIGEST" \
            '{schema_version:$schema_version,image:$image,image_tag:$image_tag,git_sha:$git_sha,image_digest:$image_digest}' \
            > "$RUNNER_TEMP/release-identity.json"

      - name: Upload immutable release identity
        uses: actions/upload-artifact@v4
        with:
          name: release-identity-${{ github.run_id }}
          path: ${{ runner.temp }}/release-identity.json
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        run: |
          echo "## Image published — ${{ steps.meta.outputs.deploy_target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.skip.outputs.already_built }}" == "true" ]]; then
            echo "_Skipped rebuild — tagged via crane (image was already built for sha-${{ steps.meta.outputs.short_sha }})._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Tags publicados:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Identidade imutavel:" >> $GITHUB_STEP_SUMMARY
          echo "- tag: \`${{ steps.published-identity.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- git SHA: \`${{ steps.published-identity.outputs.git_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- digest: \`${{ steps.published-identity.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
