name: Deploy via SSH (reusable)

# Reusable workflow que deploya imagem via SSH no VPS GameHunter.

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (backend / frontend / admin)'
        required: true
        type: string
      vps-path:
        description: 'Path absoluto no VPS (ex: /opt/gamehunter-backend)'
        required: true
        type: string
      vps-host:
        description: 'VPS host'
        required: false
        default: '82.29.59.75'
        type: string
      vps-user:
        description: 'SSH user'
        required: false
        default: root
        type: string
      health-path:
        description: 'Health check endpoint'
        required: false
        default: /health
        type: string
      public-readiness-checks:
        description: 'Espaco-separado host:/path para validar nginx/public upstream; vazio usa defaults por service; "none" pula'
        required: false
        default: ''
        type: string
      public-readiness-timeout-seconds:
        description: 'Tempo maximo para readiness publico/nginx depois do health local'
        required: false
        default: '90'
        type: string
      default-port:
        description: 'Default port pra health check'
        required: false
        default: '3001'
        type: string
      extra-services:
        description: 'Services adicionais (ex: workers)'
        required: false
        default: ''
        type: string
      deploy-workers:
        description: 'auto, true ou false; controla restart do service workers'
        required: false
        default: auto
        type: string
      worker-drain-enabled:
        description: 'Executa drain deploy-safe antes de reiniciar workers'
        required: false
        default: 'true'
        type: string
      worker-drain-timeout-minutes:
        description: 'Timeout do drain dos workers'
        required: false
        default: '15'
        type: string
      release-identity-enabled:
        description: 'Persiste tag, git SHA e digest verificados no .env do runtime'
        required: false
        default: false
        type: boolean
      cutover-mode:
        description: 'standard, protected-off ou protected-on-bounded'
        required: false
        default: standard
        type: string
      expected-git-sha:
        description: 'SHA completo esperado; obrigatorio nos modos protegidos'
        required: false
        default: ''
        type: string
      expected-image-digest:
        description: 'Digest sha256 imutavel esperado; obrigatorio nos modos protegidos'
        required: false
        default: ''
        type: string
      protected-bounded-seconds:
        description: 'Janela do canario protegido apos habilitar captura'
        required: false
        default: '60'
        type: string
      protected-predecessor-run-id:
        description: 'Run ID exato do protected-off; obrigatorio no protected-on-bounded'
        required: false
        default: ''
        type: string
      migration-cmd:
        description: 'Comando de migration (ex: npm run migrate). Vazio pula.'
        required: false
        default: ''
        type: string
      purge-cf:
        description: 'Purgar CF cache full pos deploy ok'
        required: false
        default: true
        type: boolean
      runner:
        description: 'GitHub Actions runner'
        required: false
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      tag:
        description: 'Tag pra deployar (workflow_dispatch input passthrough)'
        required: false
        default: ''
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      GHCR_PULL_TOKEN:
        required: true
      REVALIDATE_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CUTOVER_MODE: ${{ inputs.cutover-mode }}
          EXPECTED_GIT_SHA_INPUT: ${{ inputs.expected-git-sha }}
          EXPECTED_IMAGE_DIGEST_INPUT: ${{ inputs.expected-image-digest }}
          PROTECTED_BOUNDED_SECONDS_INPUT: ${{ inputs.protected-bounded-seconds }}
          PROTECTED_PREDECESSOR_RUN_ID_INPUT: ${{ inputs.protected-predecessor-run-id }}
          RELEASE_IDENTITY_ENABLED: ${{ inputs.release-identity-enabled }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$WORKFLOW_RUN_HEAD_BRANCH"
          fi
          if [[ ! "$TAG" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|sha-[0-9a-f]{7})$ ]]; then
            echo "::error::Tag deve ser semver (vX.Y.Z) ou sha-XXXXXXX"
            exit 1
          fi
          case "$CUTOVER_MODE" in
            standard|protected-off|protected-on-bounded) ;;
            *)
              echo "::error::cutover-mode invalido: $CUTOVER_MODE"
              exit 1
              ;;
          esac

          RESOLVED_GIT_SHA=""
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # GH compare API: 'identical' = TAG == main HEAD; 'behind' = TAG eh
            # ancestor de main. Substitui git fetch --tags + git rev-list +
            # merge-base (~5-8s -> ~1s, elimina necessidade de fetch-depth: 0).
            STATUS=$(gh api "/repos/${GITHUB_REPOSITORY}/compare/main...${TAG}" --jq '.status' 2>/dev/null || echo "error")
            if [[ "$STATUS" != "behind" && "$STATUS" != "identical" ]]; then
              echo "::error::Release tag $TAG is not reachable from origin/main (compare status: $STATUS). Merge this commit to main, then recreate or promote the tag from main."
              exit 1
            fi
            git fetch --tags --force origin '+refs/tags/*:refs/tags/*' >/dev/null
            RESOLVED_GIT_SHA=$(git rev-parse "$TAG^{commit}")
          else
            RESOLVED_GIT_SHA=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${TAG#sha-}" --jq '.sha')
            if [[ "${RESOLVED_GIT_SHA:0:7}" != "${TAG#sha-}" ]]; then
              echo "::error::sha tag nao corresponde ao commit resolvido"
              exit 1
            fi
          fi
          RESOLVED_GIT_SHA="${RESOLVED_GIT_SHA,,}"
          if [[ ! "$RESOLVED_GIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Nao foi possivel resolver a tag para um SHA completo"
            exit 1
          fi
          if [ -n "$EXPECTED_GIT_SHA_INPUT" ] && [ "$EXPECTED_GIT_SHA_INPUT" != "$RESOLVED_GIT_SHA" ]; then
            echo "::error::expected-git-sha nao corresponde a tag solicitada"
            exit 1
          fi
          if [ -n "$EXPECTED_IMAGE_DIGEST_INPUT" ] && [[ ! "$EXPECTED_IMAGE_DIGEST_INPUT" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::expected-image-digest invalido"
            exit 1
          fi
          if [[ "$CUTOVER_MODE" == protected-* ]]; then
            if [ "$RELEASE_IDENTITY_ENABLED" != "true" ]; then
              echo "::error::modos protegidos exigem release-identity-enabled=true"
              exit 1
            fi
            if [ -z "$EXPECTED_GIT_SHA_INPUT" ] || [ -z "$EXPECTED_IMAGE_DIGEST_INPUT" ]; then
              echo "::error::modos protegidos exigem SHA e digest esperados"
              exit 1
            fi
          fi
          if [[ ! "$PROTECTED_BOUNDED_SECONDS_INPUT" =~ ^[0-9]+$ ]] \
            || [ "$PROTECTED_BOUNDED_SECONDS_INPUT" -lt 10 ] \
            || [ "$PROTECTED_BOUNDED_SECONDS_INPUT" -gt 300 ]; then
            echo "::error::protected-bounded-seconds deve ficar entre 10 e 300"
            exit 1
          fi
          case "$CUTOVER_MODE" in
            protected-on-bounded)
              if [[ ! "$PROTECTED_PREDECESSOR_RUN_ID_INPUT" =~ ^[0-9]{1,20}$ ]]; then
                echo "::error::protected-on-bounded exige o run ID exato do protected-off"
                exit 1
              fi
              ;;
            standard|protected-off)
              if [ -n "$PROTECTED_PREDECESSOR_RUN_ID_INPUT" ]; then
                echo "::error::protected-predecessor-run-id so e aceito no protected-on-bounded"
                exit 1
              fi
              ;;
          esac
          CANARY_OPERATOR="github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [[ ! "$CANARY_OPERATOR" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{2,127}$ ]]; then
            echo "::error::Nao foi possivel gerar o identificador tecnico do canario"
            exit 1
          fi
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "git_sha=${RESOLVED_GIT_SHA}" >> $GITHUB_OUTPUT
          echo "image_digest=${EXPECTED_IMAGE_DIGEST_INPUT}" >> $GITHUB_OUTPUT
          echo "canary_operator=${CANARY_OPERATOR}" >> $GITHUB_OUTPUT
          echo "protected_predecessor_run_id=${PROTECTED_PREDECESSOR_RUN_ID_INPUT}" >> $GITHUB_OUTPUT

      - name: Resolve worker deploy mode
        id: worker-mode
        env:
          SERVICE: ${{ inputs.service-name }}
          DEPLOY_WORKERS_INPUT: ${{ inputs.deploy-workers }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          MODE="${DEPLOY_WORKERS_INPUT:-auto}"
          REASON="manual override"
          CHANGED_FILES=""

          if [ "$SERVICE" = "backend" ] && [ "$MODE" = "auto" ]; then
            git fetch --tags --force origin '+refs/tags/*:refs/tags/*' >/dev/null 2>&1 || true
            if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              TAG_CANDIDATES=$(git tag --list 'v*.*.*' --sort=-v:refname)
              PREV_TAG=""
              while IFS= read -r candidate; do
                if [ "$candidate" != "$TAG" ]; then
                  PREV_TAG="$candidate"
                  break
                fi
              done <<< "$TAG_CANDIDATES"
              if [ -n "$PREV_TAG" ] && git rev-parse -q --verify "$PREV_TAG^{commit}" >/dev/null && git rev-parse -q --verify "$TAG^{commit}" >/dev/null; then
                CHANGED_FILES=$(git diff --name-only "$PREV_TAG" "$TAG")
                REASON="auto compare $PREV_TAG..$TAG"
              else
                CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
                REASON="auto fallback HEAD tree"
              fi
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
              REASON="auto sha fallback HEAD tree"
            fi

            WORKER_DEPLOY_RE='^(src/(queue|workers|services/jobs|services/affiliates|db)/|src/services/(admin/job-runs|job-ledger-cleanup)\.js|scripts/deploy-|docker-compose\.yml|package\.json|pnpm-lock\.yaml|\.github/workflows/(build-image|deploy)\.yml)'
            if grep -Eq "$WORKER_DEPLOY_RE" <<< "$CHANGED_FILES"; then
              MODE=true
            else
              MODE=false
            fi
          fi

          if [[ "$MODE" != "auto" && "$MODE" != "true" && "$MODE" != "false" ]]; then
            echo "::error::deploy-workers precisa ser auto, true ou false (recebido: $MODE)"
            exit 1
          fi

          {
            echo "mode=$MODE"
            echo "reason=$REASON"
            echo "changed<<EOF_CHANGED"
            printf '%s\n' "$CHANGED_FILES"
            echo "EOF_CHANGED"
          } >> "$GITHUB_OUTPUT"

          echo "deploy-workers resolved: $MODE ($REASON)"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ inputs.vps-host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull image and restart on VPS
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          TAG: ${{ steps.tag.outputs.tag }}
          SERVICE: ${{ inputs.service-name }}
          VPS_PATH: ${{ inputs.vps-path }}
          VPS_HOST: ${{ inputs.vps-host }}
          VPS_USER: ${{ inputs.vps-user }}
          HEALTH_PATH: ${{ inputs.health-path }}
          PUBLIC_READINESS_CHECKS: ${{ inputs.public-readiness-checks }}
          PUBLIC_READINESS_TIMEOUT_SECONDS: ${{ inputs.public-readiness-timeout-seconds }}
          DEFAULT_PORT: ${{ inputs.default-port }}
          EXTRA_SERVICES: ${{ inputs.extra-services }}
          DEPLOY_WORKERS: ${{ steps.worker-mode.outputs.mode }}
          WORKER_DRAIN_ENABLED: ${{ inputs.worker-drain-enabled }}
          WORKER_DRAIN_TIMEOUT_MINUTES: ${{ inputs.worker-drain-timeout-minutes }}
          RELEASE_IDENTITY_ENABLED: ${{ inputs.release-identity-enabled }}
          CUTOVER_MODE: ${{ inputs.cutover-mode }}
          EXPECTED_GIT_SHA: ${{ steps.tag.outputs.git_sha }}
          EXPECTED_IMAGE_DIGEST: ${{ steps.tag.outputs.image_digest }}
          PROTECTED_BOUNDED_SECONDS: ${{ inputs.protected-bounded-seconds }}
          PROTECTED_PREDECESSOR_RUN_ID: ${{ steps.tag.outputs.protected_predecessor_run_id }}
          PROTECTED_CANARY_OPERATOR: ${{ steps.tag.outputs.canary_operator }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          MIGRATION_CMD: ${{ inputs.migration-cmd }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          # Heredoc SEM quote no marker => expansao LOCAL acontece, escapes \$ ficam literal
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" 'bash -euo pipefail -s' << EOF
            cd "$VPS_PATH"

            # ENV_FILE_HARDENING_START
            # .env contem segredos de runtime. O workflow troca apenas IMAGE_TAG,
            # sempre via arquivo temporario no mesmo diretorio e modo 0600.
            ENV_TMP=""

            cleanup_env_tmp() {
              if [ -n "\$ENV_TMP" ]; then
                rm -f -- "\$ENV_TMP"
                ENV_TMP=""
              fi
            }

            cleanup_legacy_env_new() {
              local app_dir
              local legacy_path
              local legacy_resolved

              app_dir=\$(pwd -P)
              legacy_path="\$app_dir/.env.new"
              if [ ! -e "\$legacy_path" ] && [ ! -L "\$legacy_path" ]; then
                return 0
              fi

              if [ -L "\$legacy_path" ] || [ ! -f "\$legacy_path" ]; then
                echo "FAIL: legacy .env.new must be a regular non-symlink file"
                return 1
              fi

              legacy_resolved=\$(readlink -f -- "\$legacy_path") || {
                echo "FAIL: could not resolve legacy .env.new"
                return 1
              }
              if [ "\$legacy_resolved" != "\$app_dir/.env.new" ]; then
                echo "FAIL: legacy .env.new resolves outside the application directory"
                return 1
              fi

              rm -f -- "\$legacy_path"
              if [ -e "\$legacy_path" ] || [ -L "\$legacy_path" ]; then
                echo "FAIL: legacy .env.new could not be removed safely"
                return 1
              fi
            }

            update_image_tag_env() {
              local image_tag="\$1"
              local release_tag="\${2:-}"
              local git_sha="\${3:-}"
              local image_digest="\${4:-}"
              local external_request_log="\${5:-}"
              local fetch_proxy_mode="\${6:-}"
              local sentry_egress="\${7:-}"
              local identity_enabled=false
              local capture_policy_enabled=false
              local grep_status=0
              local mode

              if [ "\$#" -eq 7 ]; then
                identity_enabled=true
                capture_policy_enabled=true
                if [[ ! "\$external_request_log" =~ ^(true|false)$ ]] \
                  || [[ ! "\$sentry_egress" =~ ^(true|false)$ ]] \
                  || [[ ! "\$fetch_proxy_mode" =~ ^(disabled|tag)$ ]]; then
                  echo "FAIL: invalid protected capture policy"
                  return 1
                fi
              elif [ "\$#" -eq 4 ]; then
                identity_enabled=true
              elif [ "\$#" -ne 1 ]; then
                echo "FAIL: release identity must be complete or omitted"
                return 1
              fi

              if [ "\$identity_enabled" = "true" ]; then
                if [[ ! "\$release_tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|sha-[0-9a-f]{7})$ ]]; then
                  echo "FAIL: invalid release identity tag"
                  return 1
                fi
                if [[ ! "\$git_sha" =~ ^[0-9a-f]{40}$ ]]; then
                  echo "FAIL: invalid release identity git SHA"
                  return 1
                fi
                if [[ ! "\$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                  echo "FAIL: invalid release identity image digest"
                  return 1
                fi
              fi

              cleanup_env_tmp
              if ! cleanup_legacy_env_new; then
                return 1
              fi
              if [ ! -f .env ] || [ -L .env ]; then
                echo "FAIL: .env must be a regular non-symlink file"
                return 1
              fi
              # Escopa o umask ao temporario para nao alterar outros artefatos do deploy.
              if ! ENV_TMP=\$(umask 077; mktemp ".env.tmp.XXXXXX"); then
                ENV_TMP=""
                return 1
              fi
              if [ "\$capture_policy_enabled" = "true" ]; then
                grep -Ev '^(IMAGE_TAG|GH_RELEASE_TAG|GH_GIT_SHA|GH_IMAGE_DIGEST|EXTERNAL_REQUEST_LOG_ENABLED|FETCH_PROXY_MODE|SENTRY_EGRESS_ENABLED)=' .env > "\$ENV_TMP" || grep_status=\$?
              else
                # Opt-out also removes stale release identity from previous deploys.
                grep -Ev '^(IMAGE_TAG|GH_RELEASE_TAG|GH_GIT_SHA|GH_IMAGE_DIGEST)=' .env > "\$ENV_TMP" || grep_status=\$?
              fi
              if [ "\$grep_status" -gt 1 ]; then
                cleanup_env_tmp
                return "\$grep_status"
              fi

              if ! printf 'IMAGE_TAG=%s\n' "\$image_tag" >> "\$ENV_TMP"; then
                return 1
              fi
              if [ "\$identity_enabled" = "true" ]; then
                if ! printf 'GH_RELEASE_TAG=%s\nGH_GIT_SHA=%s\nGH_IMAGE_DIGEST=%s\n' \
                  "\$release_tag" "\$git_sha" "\$image_digest" >> "\$ENV_TMP"; then
                  return 1
                fi
              fi
              if [ "\$capture_policy_enabled" = "true" ]; then
                if ! printf 'EXTERNAL_REQUEST_LOG_ENABLED=%s\nFETCH_PROXY_MODE=%s\nSENTRY_EGRESS_ENABLED=%s\n' \
                  "\$external_request_log" "\$fetch_proxy_mode" "\$sentry_egress" >> "\$ENV_TMP"; then
                  return 1
                fi
              fi
              if ! chmod 600 "\$ENV_TMP"; then
                return 1
              fi
              if ! mv -fT -- "\$ENV_TMP" .env; then
                return 1
              fi
              ENV_TMP=""
              if [ ! -f .env ] || [ -L .env ]; then
                echo "FAIL: .env handoff did not produce a regular non-symlink file"
                return 1
              fi

              mode=\$(stat -c '%a' .env)
              if [ "\$mode" != "600" ]; then
                echo "FAIL: .env permissions are \$mode; expected 600"
                return 1
              fi
            }

            resolve_release_identity() {
              local image_ref="\$1"
              local release_tag="\$2"
              local expected_git_sha="\${3:-}"
              local expected_image_digest="\${4:-}"
              local git_sha
              local image_repository
              local candidate_digest
              local match_count=0
              local repo_digest
              local image_digest

              git_sha=\$(docker image inspect \
                --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
                "\$image_ref")
              image_repository="\${image_ref%:*}"
              repo_digest=""
              while IFS= read -r candidate_digest; do
                case "\$candidate_digest" in
                  "\$image_repository"@*)
                    repo_digest="\$candidate_digest"
                    match_count=\$((match_count + 1))
                    ;;
                esac
              done < <(docker image inspect \
                --format '{{range .RepoDigests}}{{println .}}{{end}}' \
                "\$image_ref")
              if [ "\$match_count" -ne 1 ]; then
                echo "FAIL: expected exactly one target repository digest; found \$match_count"
                return 1
              fi
              image_digest="\${repo_digest##*@}"

              if [[ ! "\$release_tag" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|sha-[0-9a-f]{7})$ ]]; then
                echo "FAIL: invalid release identity tag"
                return 1
              fi
              git_sha="\${git_sha,,}"
              if [[ ! "\$git_sha" =~ ^[0-9a-f]{40}$ ]]; then
                echo "FAIL: image is missing a full OCI revision label"
                return 1
              fi
              if [[ "\$release_tag" == sha-* ]] \
                && [ "\${git_sha:0:7}" != "\${release_tag#sha-}" ]; then
                echo "FAIL: image OCI revision does not match sha tag"
                return 1
              fi
              if [[ ! "\$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                echo "FAIL: pulled image is missing a valid repository digest"
                return 1
              fi
              if [ -n "\$expected_git_sha" ] && [ "\$git_sha" != "\$expected_git_sha" ]; then
                echo "FAIL: pulled image OCI revision does not match expected Git SHA"
                return 1
              fi
              if [ -n "\$expected_image_digest" ] \
                && [ "\$image_digest" != "\$expected_image_digest" ]; then
                echo "FAIL: pulled image digest does not match expected digest"
                return 1
              fi

              GH_RELEASE_TAG="\$release_tag"
              GH_GIT_SHA="\$git_sha"
              GH_IMAGE_DIGEST="\$image_digest"
              export GH_RELEASE_TAG GH_GIT_SHA GH_IMAGE_DIGEST
            }
            # ENV_FILE_HARDENING_END

            trap 'status=\$?; cleanup_env_tmp; exit \$status' EXIT

            git fetch origin main
            git reset --hard origin/main

            echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GH_OWNER" --password-stdin

            CURRENT=""
            ROLLBACK_RELEASE_TAG=""
            if [ "$CUTOVER_MODE" = "standard" ]; then
              CURRENT=\$(docker compose images "$SERVICE" --quiet 2>/dev/null || true)
              if [ "$RELEASE_IDENTITY_ENABLED" = "true" ]; then
                if [ ! -f .env ] || [ -L .env ]; then
                  echo "FAIL: .env must be a regular non-symlink file"
                  exit 1
                fi
                ROLLBACK_RELEASE_TAG=\$(sed -n 's/^GH_RELEASE_TAG=//p' .env | tail -n 1)
                if [ -z "\$ROLLBACK_RELEASE_TAG" ]; then
                  ROLLBACK_RELEASE_TAG=\$(sed -n 's/^IMAGE_TAG=//p' .env | tail -n 1)
                fi
              fi
              if [ -n "\$CURRENT" ]; then
                docker tag "\$CURRENT" "$IMAGE:rollback" || true
              fi
            fi

            export IMAGE_TAG="$TAG"

            EXTRA_SERVICES_EFFECTIVE="$EXTRA_SERVICES"
            if [ "$SERVICE" = "backend" ]; then
              case "$DEPLOY_WORKERS" in
                false)
                  EXTRA_SERVICES_EFFECTIVE=\$(printf '%s\n' "$EXTRA_SERVICES" | tr ' ' '\n' | grep -v '^workers$' | xargs || true)
                  ;;
                true)
                  if ! printf ' %s ' "\$EXTRA_SERVICES_EFFECTIVE" | grep -q ' workers '; then
                    EXTRA_SERVICES_EFFECTIVE="\${EXTRA_SERVICES_EFFECTIVE:+\$EXTRA_SERVICES_EFFECTIVE }workers"
                  fi
                  ;;
                auto|'')
                  ;;
                *)
                  echo "FAIL: deploy-workers precisa ser auto, true ou false (recebido: $DEPLOY_WORKERS)"
                  exit 1
                  ;;
              esac
            fi

            ALL_SERVICES="$SERVICE \$EXTRA_SERVICES_EFFECTIVE"
            if [ "$CUTOVER_MODE" = "standard" ]; then
              docker compose pull \$ALL_SERVICES
              if [ "$RELEASE_IDENTITY_ENABLED" = "true" ]; then
                resolve_release_identity \
                  "$IMAGE:$TAG" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST"
                update_image_tag_env "\$IMAGE_TAG" "\$GH_RELEASE_TAG" "\$GH_GIT_SHA" "\$GH_IMAGE_DIGEST"
              else
                update_image_tag_env "\$IMAGE_TAG"
              fi

              if [ -n "$MIGRATION_CMD" ]; then
                docker compose run -T --rm --no-deps "$SERVICE" $MIGRATION_CMD < /dev/null
              fi
            fi

            PUBLIC_CHECKS="$PUBLIC_READINESS_CHECKS"
            if [ -z "\$PUBLIC_CHECKS" ]; then
              case "$SERVICE" in
                backend)
                  PUBLIC_CHECKS="gamehunter.com.br:/api/health gamehunter.com.br:/api/rpc/health"
                  ;;
                frontend)
                  PUBLIC_CHECKS="gamehunter.com.br:/"
                  ;;
                admin)
                  PUBLIC_CHECKS="admin.gamehunter.com.br:/"
                  ;;
                *)
                  PUBLIC_CHECKS="none"
                  ;;
              esac
            fi

            PUBLIC_TIMEOUT="$PUBLIC_READINESS_TIMEOUT_SECONDS"
            PUBLIC_TIMEOUT=\${PUBLIC_TIMEOUT:-90}
            PUBLIC_ATTEMPTS=\$(( (PUBLIC_TIMEOUT + 1) / 2 ))
            if [ "\$PUBLIC_ATTEMPTS" -lt 1 ]; then PUBLIC_ATTEMPTS=1; fi

            public_readiness_ok() {
              local absolute_deadline="\${1:-0}"
              local check host path max_time remaining
              for check in \$PUBLIC_CHECKS; do
                host="\${check%%:*}"
                path="\${check#*:}"
                if [ -z "\$host" ] || [ -z "\$path" ] || [ "\$host" = "\$path" ]; then
                  echo "Invalid public readiness check: \$check"
                  return 1
                fi
                max_time=8
                if [ "\$absolute_deadline" -gt 0 ]; then
                  remaining=\$((absolute_deadline - SECONDS))
                  if [ "\$remaining" -le 0 ]; then
                    echo "FAIL: protected readiness matrix exceeded its deadline"
                    return 1
                  fi
                  if [ "\$remaining" -lt "\$max_time" ]; then max_time="\$remaining"; fi
                fi
                curl -fsS --connect-timeout 2 --max-time "\$max_time" \
                  --resolve "\$host:443:127.0.0.1" \
                  "https://\$host\$path" > /dev/null || return 1
              done
              return 0
            }

            wait_local_health() {
              local port="\$1"
              local label="\$2"
              echo "Health check em localhost:\$port$HEALTH_PATH (\$label)"
              for i in \$(seq 1 30); do
                if curl -fsS --connect-timeout 2 --max-time 8 \
                  "http://localhost:\$port$HEALTH_PATH" > /dev/null 2>&1; then
                  echo "OK $SERVICE local health on \$label"
                  return 0
                fi
                sleep 2
              done
              return 1
            }

            wait_public_readiness() {
              local label="\$1"
              if [ "\$PUBLIC_CHECKS" = "none" ]; then
                echo "Public readiness skipped (\$label)"
                return 0
              fi
              echo "Public readiness via local nginx (\$label): \$PUBLIC_CHECKS"
              for j in \$(seq 1 "\$PUBLIC_ATTEMPTS"); do
                if public_readiness_ok; then
                  echo "OK $SERVICE public readiness on \$label"
                  return 0
                fi
                sleep 2
              done
              echo "FAIL: public readiness failed after \${PUBLIC_TIMEOUT}s (\$label)"
              return 1
            }

            candidate_direct_readiness_ok() {
              local checked=0
              local check host path
              for check in \$PUBLIC_CHECKS; do
                host="\${check%%:*}"
                path="\${check#*:}"
                if [ "$SERVICE" = "backend" ]; then
                  case "\$path" in
                    /api/*|/health) ;;
                    *) continue ;;
                  esac
                fi
                checked=1
                curl -fsS --connect-timeout 2 --max-time 8 \
                  -H "Host: \$host" \
                  "http://127.0.0.1:\$HANDOFF_CANDIDATE_PORT\$path" > /dev/null || return 1
              done
              if [ "\$checked" -eq 0 ]; then
                echo "Candidate direct readiness skipped: no $SERVICE-owned public paths"
              fi
              return 0
            }

            wait_candidate_direct_readiness() {
              if [ "\$PUBLIC_CHECKS" = "none" ]; then
                return 0
              fi
              if [ "$SERVICE" != "backend" ] && [ "$SERVICE" != "frontend" ]; then
                return 0
              fi
              echo "Candidate direct readiness on localhost:\$HANDOFF_CANDIDATE_PORT"
              for j in \$(seq 1 "\$PUBLIC_ATTEMPTS"); do
                if candidate_direct_readiness_ok; then
                  echo "OK $SERVICE candidate direct readiness"
                  return 0
                fi
                sleep 2
              done
              echo "FAIL: candidate direct readiness failed after \${PUBLIC_TIMEOUT}s"
              return 1
            }

            WORKER_DRAIN_ID=""
            WORKER_DRAIN_DEPLOY_REF=""
            HANDOFF_CANDIDATE_CONTAINER=""
            HANDOFF_CANDIDATE_PORT=""
            HANDOFF_MARKER=""
            HANDOFF_NGINX_SITE="/etc/nginx/sites-enabled/gamehunter"
            HANDOFF_NGINX_BACKUP_DIR="/tmp/gamehunter-deploy-nginx-backups"

            resume_worker_queue() {
              if [ -n "\$WORKER_DRAIN_ID" ]; then
                local reason="\${1:-deploy workflow finalizer}"
                local strict="\${2:-false}"
                if docker compose run -T --rm --no-deps "$SERVICE" npm run deploy:workers:resume -- \
                  --drain-id "\$WORKER_DRAIN_ID" \
                  --reason "\$reason" \
                  --json < /dev/null; then
                  WORKER_DRAIN_ID=""
                  WORKER_DRAIN_DEPLOY_REF=""
                elif [ "\$strict" = "true" ]; then
                  return 1
                fi
              fi
            }

            start_worker_drain() {
              if [ "\$SHOULD_DRAIN_WORKERS" != "true" ]; then
                if [ "$CUTOVER_MODE" != "standard" ]; then
                  echo "FAIL: protected backend release requires workers and deploy drain"
                  return 1
                fi
                return 0
              fi
              local created_drain_id
              local drain_output
              WORKER_DRAIN_TIMEOUT_MS=\$(( ${WORKER_DRAIN_TIMEOUT_MINUTES:-15} * 60 * 1000 ))
              echo "Deploy-safe worker drain: timeout=\${WORKER_DRAIN_TIMEOUT_MS}ms"
              drain_output=\$(docker compose run -T --rm --no-deps "$SERVICE" npm run deploy:workers:drain -- \
                --deploy-ref "$DEPLOY_RUN_ID" \
                --image-tag "$TAG" \
                --timeout-ms "\$WORKER_DRAIN_TIMEOUT_MS" \
                --source github_actions \
                --json < /dev/null) || return 1
              echo "\$drain_output"
              WORKER_DRAIN_ID=\$(printf '%s\n' "\$drain_output" | tail -n 1 \
                | sed -n 's/.*"drain_id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              if [[ ! "\$WORKER_DRAIN_ID" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]; then
                echo "FAIL: drain liberou deploy sem drain_id parseavel"
                WORKER_DRAIN_ID=""
                return 1
              fi
              created_drain_id="\$WORKER_DRAIN_ID"
              recover_active_drain_id "$DEPLOY_RUN_ID" || return 1
              if [ "\$WORKER_DRAIN_ID" != "\$created_drain_id" ]; then
                echo "FAIL: active drain changed during deploy handoff"
                return 1
              fi
            }

            # PROTECTED_RELEASE_FLOW_START
            assert_protected_runtime_controls() {
              local normalized_services
              normalized_services=\$(printf '%s\n' "\$ALL_SERVICES" | xargs)
              if [ "$SERVICE" != "backend" ] \
                || [ "$DEPLOY_WORKERS" != "true" ] \
                || [ "$WORKER_DRAIN_ENABLED" != "true" ] \
                || [ "\$SHOULD_DRAIN_WORKERS" != "true" ] \
                || [ "\$normalized_services" != "backend workers" ]; then
                echo "FAIL: protected release requires backend + workers with mandatory drain"
                return 1
              fi
            }

            recover_active_drain_id() {
              local expected_deploy_ref="\$1"
              local active_drain_json
              local deploy_ref
              local queue_json
              local recovered_id
              local recovered_image_tag
              local recovered_status
              local snapshot
              local status_output
              status_output=\$(docker compose run -T --rm --no-deps "$SERVICE" \
                npm run deploy:workers:status -- --json < /dev/null) || return 1
              snapshot=\$(printf '%s\n' "\$status_output" | grep '^{' | tail -n 1)
              queue_json=\$(printf '%s\n' "\$snapshot" \
                | sed -n 's/^{"queue"://; s/,"active_drain".*//; p')
              active_drain_json=\$(printf '%s\n' "\$snapshot" \
                | sed -n 's/.*"active_drain"://; s/,"active_jobs".*//; p')
              recovered_id=\$(printf '%s\n' "\$active_drain_json" \
                | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')
              deploy_ref=\$(printf '%s\n' "\$active_drain_json" \
                | sed -n 's/.*"deploy_ref":"\([^"]*\)".*/\1/p')
              recovered_image_tag=\$(printf '%s\n' "\$active_drain_json" \
                | sed -n 's/.*"image_tag":"\([^"]*\)".*/\1/p')
              recovered_status=\$(printf '%s\n' "\$active_drain_json" \
                | sed -n 's/.*"status":"\([^"]*\)".*/\1/p')
              if [[ ! "\$recovered_id" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]; then
                echo "FAIL: protected release requires one active deploy drain"
                return 1
              fi
              if [[ ! "\$expected_deploy_ref" =~ ^[0-9]{1,20}$ ]] \
                || [ "\$deploy_ref" != "\$expected_deploy_ref" ] \
                || [ "\$recovered_image_tag" != "$TAG" ] \
                || [ "\$recovered_status" != "ready" ]; then
                echo "FAIL: active drain is stale or belongs to another release"
                return 1
              fi
              case "\$queue_json" in
                *'"paused":true'*'"pause_reason":"deploy_drain"'*) ;;
                *)
                  echo "FAIL: active drain does not prove the queue is paused"
                  return 1
                  ;;
              esac
              WORKER_DRAIN_ID="\$recovered_id"
              WORKER_DRAIN_DEPLOY_REF="\$deploy_ref"
            }

            read_single_env_value() {
              local key="\$1"
              local count
              count=\$(grep -c "^\${key}=" .env || true)
              if [ "\$count" -ne 1 ]; then
                echo "FAIL: expected exactly one \$key in .env"
                return 1
              fi
              sed -n "s/^\${key}=//p" .env
            }

            assert_persisted_release_identity() {
              local capture_enabled fetch_proxy_mode persisted_digest persisted_image_tag
              local persisted_sha persisted_tag sentry_enabled
              if [ ! -f .env ] || [ -L .env ]; then
                echo "FAIL: .env must be a regular non-symlink file"
                return 1
              fi
              persisted_image_tag=\$(read_single_env_value IMAGE_TAG) || return 1
              persisted_tag=\$(read_single_env_value GH_RELEASE_TAG) || return 1
              persisted_sha=\$(read_single_env_value GH_GIT_SHA) || return 1
              persisted_digest=\$(read_single_env_value GH_IMAGE_DIGEST) || return 1
              capture_enabled=\$(read_single_env_value EXTERNAL_REQUEST_LOG_ENABLED) || return 1
              fetch_proxy_mode=\$(read_single_env_value FETCH_PROXY_MODE) || return 1
              sentry_enabled=\$(read_single_env_value SENTRY_EGRESS_ENABLED) || return 1
              if [ "\$persisted_image_tag" != "$TAG" ] \
                || [ "\$persisted_tag" != "$TAG" ] \
                || [ "\$persisted_sha" != "$EXPECTED_GIT_SHA" ] \
                || [ "\$persisted_digest" != "$EXPECTED_IMAGE_DIGEST" ]; then
                echo "FAIL: requested protected tuple differs from persisted runtime tuple"
                return 1
              fi
              if [ "\$capture_enabled" != "false" ] \
                || [ "\$fetch_proxy_mode" != "disabled" ] \
                || [ "\$sentry_enabled" != "false" ]; then
                echo "FAIL: protected capture-on requires a proven capture-off predecessor"
                return 1
              fi
            }

            assert_running_release_identity() {
              local image_ref="\$1"
              local expected_git_sha="\$2"
              local expected_image_digest="\$3"
              local expected_external_request_log="\${4:-}"
              local expected_fetch_proxy_mode="\${5:-}"
              local expected_sentry_egress="\${6:-}"
              local expected_image_id
              local running_service
              local container_ids
              local container_id
              local effective_env
              local env_key
              local env_key_count
              local env_match_count
              local expected_env
              local running_image_id
              local running_state
              local running_revision
              local target_repository
              local candidate_digest
              local digest_matches

              expected_image_id=\$(docker image inspect --format '{{.Id}}' "\$image_ref") || return 1
              target_repository="\${image_ref%:*}"
              for running_service in \$ALL_SERVICES; do
                container_ids=\$(docker compose ps -q "\$running_service") || return 1
                if [ -z "\$container_ids" ]; then
                  echo "FAIL: service \$running_service has no running container"
                  return 1
                fi
                for container_id in \$container_ids; do
                  running_state=\$(docker inspect --format '{{.State.Running}}' "\$container_id") || return 1
                  running_image_id=\$(docker inspect --format '{{.Image}}' "\$container_id") || return 1
                  if [ "\$running_state" != "true" ] || [ "\$running_image_id" != "\$expected_image_id" ]; then
                    echo "FAIL: service \$running_service is not running the expected image ID"
                    return 1
                  fi
                  running_revision=\$(docker image inspect \
                    --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
                    "\$running_image_id") || return 1
                  if [ "\${running_revision,,}" != "\$expected_git_sha" ]; then
                    echo "FAIL: service \$running_service OCI revision mismatch"
                    return 1
                  fi
                  digest_matches=0
                  while IFS= read -r candidate_digest; do
                    if [ "\$candidate_digest" = "\$target_repository@\$expected_image_digest" ]; then
                      digest_matches=\$((digest_matches + 1))
                    fi
                  done < <(docker image inspect \
                    --format '{{range .RepoDigests}}{{println .}}{{end}}' \
                    "\$running_image_id")
                  if [ "\$digest_matches" -ne 1 ]; then
                    echo "FAIL: service \$running_service digest mismatch"
                    return 1
                  fi
                  if [ -n "\$expected_external_request_log" ]; then
                    effective_env=\$(docker inspect \
                      --format '{{range .Config.Env}}{{println .}}{{end}}' \
                      "\$container_id") || return 1
                    for expected_env in \
                      "EXTERNAL_REQUEST_LOG_ENABLED=\$expected_external_request_log" \
                      "FETCH_PROXY_MODE=\$expected_fetch_proxy_mode" \
                      "SENTRY_EGRESS_ENABLED=\$expected_sentry_egress"; do
                      env_key="\${expected_env%%=*}"
                      env_key_count=\$(printf '%s\n' "\$effective_env" \
                        | grep -c "^\${env_key}=" || true)
                      env_match_count=\$(printf '%s\n' "\$effective_env" \
                        | grep -Fxc "\$expected_env" || true)
                      if [ "\$env_key_count" -ne 1 ] || [ "\$env_match_count" -ne 1 ]; then
                        echo "FAIL: service \$running_service effective protected policy mismatch for \$env_key"
                        return 1
                      fi
                    done
                  fi
                done
              done
            }

            PROTECTED_MUTATED=false
            PROTECTED_IDENTITY_VERIFIED=false
            PROTECTED_QUEUE_PAUSED=false
            CANARY_RUNTIME_CONTAINER=""
            CANARY_CONTAINER_MANIFEST_PATH=""
            CANARY_MANIFEST_TMP=""

            cleanup_protected_canary_runtime() {
              if [ -n "\$CANARY_RUNTIME_CONTAINER" ] \
                && [ -n "\$CANARY_CONTAINER_MANIFEST_PATH" ]; then
                docker exec "\$CANARY_RUNTIME_CONTAINER" \
                  rm -f -- "\$CANARY_CONTAINER_MANIFEST_PATH" >/dev/null 2>&1 || true
              fi
              CANARY_RUNTIME_CONTAINER=""
              CANARY_CONTAINER_MANIFEST_PATH=""
              if [ -n "\$CANARY_MANIFEST_TMP" ]; then
                rm -f -- "\$CANARY_MANIFEST_TMP"
                CANARY_MANIFEST_TMP=""
              fi
            }

            build_runtime_manifest_from_running_containers() {
              local app_count=0
              local container_id
              local container_ids
              local expected_image_id
              local first=true
              local generated_at
              local role
              local running_image_id
              local running_service
              local running_state
              local worker_count=0

              cleanup_protected_canary_runtime
              CANARY_MANIFEST_TMP=\$(umask 077; mktemp ".external-request-runtime-manifest.XXXXXX") \
                || return 1
              expected_image_id=\$(docker image inspect --format '{{.Id}}' "$IMAGE:$TAG") \
                || return 1
              generated_at=\$(date -u +'%Y-%m-%dT%H:%M:%S.%3NZ')
              if [[ ! "\$generated_at" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}\.[0-9]{3}Z$ ]]; then
                echo "FAIL: runtime manifest timestamp is invalid"
                return 1
              fi
              printf '{"schema_version":"1","manifest_id":"f1-513-$DEPLOY_RUN_ID","generated_at":"%s","instances":[' \
                "\$generated_at" \
                > "\$CANARY_MANIFEST_TMP" || return 1

              for running_service in \$ALL_SERVICES; do
                case "\$running_service" in
                  "$SERVICE") role=app ;;
                  workers) role=worker ;;
                  *)
                    echo "FAIL: protected canary does not accept an unknown runtime role"
                    return 1
                    ;;
                esac
                container_ids=\$(docker compose ps -q "\$running_service") || return 1
                [ -n "\$container_ids" ] || {
                  echo "FAIL: runtime manifest is missing \$role instances"
                  return 1
                }
                for container_id in \$container_ids; do
                  if [[ ! "\$container_id" =~ ^[0-9a-f]{12,64}$ ]]; then
                    echo "FAIL: runtime manifest received an invalid container identity"
                    return 1
                  fi
                  running_state=\$(docker inspect --format '{{.State.Running}}' "\$container_id") \
                    || return 1
                  running_image_id=\$(docker inspect --format '{{.Image}}' "\$container_id") \
                    || return 1
                  if [ "\$running_state" != "true" ] \
                    || [ "\$running_image_id" != "\$expected_image_id" ]; then
                    echo "FAIL: runtime manifest refuses an unverified container"
                    return 1
                  fi
                  if [ "\$first" = "true" ]; then
                    first=false
                  else
                    printf ',' >> "\$CANARY_MANIFEST_TMP" || return 1
                  fi
                  printf '{"role":"%s","instance_id":"%s","release_tag":"%s","git_sha":"%s","image_digest":"%s"}' \
                    "\$role" "\$container_id" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    >> "\$CANARY_MANIFEST_TMP" || return 1
                  if [ "\$role" = "app" ]; then
                    app_count=\$((app_count + 1))
                    if [ -z "\$CANARY_RUNTIME_CONTAINER" ]; then
                      CANARY_RUNTIME_CONTAINER="\$container_id"
                    fi
                  else
                    worker_count=\$((worker_count + 1))
                  fi
                done
              done
              printf ']}\n' >> "\$CANARY_MANIFEST_TMP" || return 1
              chmod 600 "\$CANARY_MANIFEST_TMP" || return 1
              if [ "\$app_count" -lt 1 ] || [ "\$worker_count" -lt 1 ]; then
                echo "FAIL: runtime manifest requires app and worker parity evidence"
                return 1
              fi
              if [[ ! "\$CANARY_RUNTIME_CONTAINER" =~ ^[0-9a-f]{12,64}$ ]]; then
                echo "FAIL: runtime manifest has no validated backend execution target"
                return 1
              fi
              echo "Runtime manifest built from \$app_count app and \$worker_count worker container(s)"
            }

            force_same_image_capture_off() {
              if [ "\$PROTECTED_IDENTITY_VERIFIED" != "true" ]; then
                echo "FAIL: cannot contain without a verified same image"
                return 1
              fi
              export IMAGE_TAG="$TAG"
              docker compose stop \$ALL_SERVICES || return 1
              update_image_tag_env \
                "\$IMAGE_TAG" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                false disabled false || return 1
              docker compose up -d --no-build --force-recreate \$ALL_SERVICES || return 1
              assert_running_release_identity \
                "$IMAGE:$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                false disabled false || return 1
              PORT=\$(grep '^PORT=' .env | cut -d= -f2 | head -1)
              PORT=\${PORT:-$DEFAULT_PORT}
              wait_local_health "\$PORT" "protected same-image capture-off" || return 1
              wait_public_readiness "protected same-image capture-off" || return 1
            }

            ensure_protected_queue_paused() {
              local expected_deploy_ref="\$WORKER_DRAIN_DEPLOY_REF"
              if [ "\$SHOULD_DRAIN_WORKERS" != "true" ]; then
                echo "FAIL: protected backend release requires worker drain"
                return 1
              fi
              if [ -z "\$expected_deploy_ref" ] \
                && [ "$CUTOVER_MODE" = "protected-on-bounded" ]; then
                expected_deploy_ref="$PROTECTED_PREDECESSOR_RUN_ID"
              fi
              if [ -n "\$expected_deploy_ref" ] \
                && recover_active_drain_id "\$expected_deploy_ref" >/dev/null 2>&1; then
                PROTECTED_QUEUE_PAUSED=true
                return 0
              fi
              WORKER_DRAIN_ID=""
              WORKER_DRAIN_DEPLOY_REF=""
              start_worker_drain || return 1
              PROTECTED_QUEUE_PAUSED=true
            }

            contain_protected_failure() {
              local containment_failed=false
              echo "FAIL: protected release failed; enforcing same-image capture-off containment"
              if ! ensure_protected_queue_paused; then
                echo "FAIL: could not prove worker queue paused during containment"
                containment_failed=true
              fi
              if [ "\$PROTECTED_MUTATED" = "true" ]; then
                if ! force_same_image_capture_off; then
                  echo "FAIL: same-image capture-off containment needs manual intervention"
                  containment_failed=true
                fi
              fi
              if [ "\$containment_failed" = "true" ]; then
                return 2
              fi
              return 1
            }

            run_protected_telemetry_canary() {
              local canary_output
              local count_key
              local count_value
              local report
              local report_count
              local run_id
              local container_hash
              local expected_image_id
              local host_hash

              # BullMQ worker registrations can outlive a graceful container
              # replacement for one lock interval. Keep the parity check exact,
              # but let the superseded registration expire before observing it.
              echo "Waiting for BullMQ worker registry to stabilize"
              sleep 35

              build_runtime_manifest_from_running_containers \
                || { cleanup_protected_canary_runtime; return 1; }
              CANARY_CONTAINER_MANIFEST_PATH="/tmp/gamehunter-f1-513-runtime-manifest-$DEPLOY_RUN_ID.json"
              expected_image_id=\$(docker image inspect --format '{{.Id}}' "$IMAGE:$TAG") \
                || { cleanup_protected_canary_runtime; return 1; }
              if [ "\$(docker inspect --format '{{.Image}}' "\$CANARY_RUNTIME_CONTAINER")" \
                != "\$expected_image_id" ]; then
                echo "FAIL: canary target is not using the verified release image"
                cleanup_protected_canary_runtime
                return 1
              fi
              if ! docker exec "\$CANARY_RUNTIME_CONTAINER" \
                test ! -e "\$CANARY_CONTAINER_MANIFEST_PATH"; then
                echo "FAIL: backend contains a pre-existing runtime manifest"
                cleanup_protected_canary_runtime
                return 1
              fi
              docker cp "\$CANARY_MANIFEST_TMP" \
                "\$CANARY_RUNTIME_CONTAINER:\$CANARY_CONTAINER_MANIFEST_PATH" \
                || { cleanup_protected_canary_runtime; return 1; }
              docker exec "\$CANARY_RUNTIME_CONTAINER" \
                chmod 600 "\$CANARY_CONTAINER_MANIFEST_PATH" \
                || { cleanup_protected_canary_runtime; return 1; }
              host_hash=\$(sha256sum "\$CANARY_MANIFEST_TMP" | cut -d ' ' -f1)
              container_hash=\$(docker exec "\$CANARY_RUNTIME_CONTAINER" \
                sha256sum "\$CANARY_CONTAINER_MANIFEST_PATH" | cut -d ' ' -f1) \
                || { cleanup_protected_canary_runtime; return 1; }
              if [[ ! "\$host_hash" =~ ^[0-9a-f]{64}$ ]] \
                || [ "\$container_hash" != "\$host_hash" ]; then
                echo "FAIL: copied runtime manifest is missing or was altered"
                cleanup_protected_canary_runtime
                return 1
              fi

              canary_output=\$(docker exec \
                -e "EXTERNAL_REQUEST_TELEMETRY_RUNTIME_MANIFEST_PATH=\$CANARY_CONTAINER_MANIFEST_PATH" \
                "\$CANARY_RUNTIME_CONTAINER" \
                npm run external-request-telemetry:canary -- \
                --approved-spec=F1-513 \
                --confirm-high=run-protected-telemetry-canary \
                --operator="$PROTECTED_CANARY_OPERATOR" \
                --json < /dev/null) \
                || { cleanup_protected_canary_runtime; return 1; }
              cleanup_protected_canary_runtime
              report_count=\$(printf '%s\n' "\$canary_output" \
                | grep -c '^{"schema_version":"1","status":"passed"' || true)
              report=\$(printf '%s\n' "\$canary_output" \
                | grep '^{"schema_version":"1","status":"passed"' | tail -n 1)
              if [ "\$report_count" -ne 1 ] || [ -z "\$report" ]; then
                echo "FAIL: protected telemetry canary did not emit one passed report"
                return 1
              fi
              run_id=\$(printf '%s\n' "\$report" \
                | sed -n 's/.*"run_id":"\([A-Za-z0-9._-]*\)".*/\1/p')
              if [[ ! "\$run_id" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{2,127}$ ]]; then
                echo "FAIL: protected telemetry canary run_id is invalid"
                return 1
              fi
              for count_key in \
                fetch_stub_calls subscriber_events redis_jobs postgres_rows admin_responses \
                log_primary log_error log_stdout \
                sentry_error sentry_transaction sentry_span sentry_breadcrumb sentry_log; do
                count_value=\$(printf '%s\n' "\$report" \
                  | sed -n "s/.*\"\${count_key}\":\([0-9][0-9]*\).*/\1/p")
                if [ "\$count_value" != "1" ]; then
                  echo "FAIL: protected telemetry canary positive control \$count_key is not exactly one"
                  return 1
                fi
              done
              count_value=\$(printf '%s\n' "\$report" \
                | sed -n 's/.*"log_signals":\([0-9][0-9]*\).*/\1/p')
              if [ "\$count_value" != "3" ]; then
                echo "FAIL: protected telemetry canary log_signals is not exactly three"
                return 1
              fi
              count_value=\$(printf '%s\n' "\$report" \
                | sed -n 's/.*"bullmq_matrix_checks":\([0-9][0-9]*\).*/\1/p')
              if [ "\$count_value" != "5" ]; then
                echo "FAIL: protected telemetry canary bullmq_matrix_checks is not exactly five"
                return 1
              fi
              for count_key in vendor_calls raw_violations; do
                count_value=\$(printf '%s\n' "\$report" \
                  | sed -n "s/.*\"\${count_key}\":\([0-9][0-9]*\).*/\1/p")
                if [ "\$count_value" != "0" ]; then
                  echo "FAIL: protected telemetry canary negative control \$count_key is not zero"
                  return 1
                fi
              done
              echo "Protected telemetry canary passed: run_id=\$run_id"
            }

            bounded_protected_canary() {
              local deadline
              local max_time
              local port
              local remaining
              echo "Starting bounded protected canary for $PROTECTED_BOUNDED_SECONDS seconds"
              port=\$(grep '^PORT=' .env | cut -d= -f2 | head -1)
              port=\${port:-$DEFAULT_PORT}
              deadline=\$((SECONDS + $PROTECTED_BOUNDED_SECONDS))
              while [ "\$SECONDS" -lt "\$deadline" ]; do
                remaining=\$((deadline - SECONDS))
                max_time=8
                if [ "\$remaining" -lt "\$max_time" ]; then max_time="\$remaining"; fi
                curl -fsS --connect-timeout 2 --max-time "\$max_time" \
                  "http://localhost:\$port$HEALTH_PATH" > /dev/null 2>&1 || return 1
                public_readiness_ok "\$deadline" || return 1
                remaining=\$((deadline - SECONDS))
                if [ "\$remaining" -le 0 ]; then break; fi
                if [ "\$remaining" -lt 2 ]; then sleep "\$remaining"; else sleep 2; fi
              done
            }

            run_protected_release_flow() {
              assert_protected_runtime_controls || return 1
              docker pull "$IMAGE:$TAG" || return 1
              resolve_release_identity \
                "$IMAGE:$TAG" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" || return 1
              PROTECTED_IDENTITY_VERIFIED=true

              case "$CUTOVER_MODE" in
                protected-off)
                  start_worker_drain || return 1
                  PROTECTED_QUEUE_PAUSED=true
                  PROTECTED_MUTATED=true
                  docker compose stop \$ALL_SERVICES || return 1
                  update_image_tag_env \
                    "$TAG" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    false disabled false || return 1
                  if [ -n "$MIGRATION_CMD" ]; then
                    docker compose run -T --rm --no-deps "$SERVICE" \
                      $MIGRATION_CMD < /dev/null || return 1
                  fi
                  docker compose up -d --no-build --force-recreate \$ALL_SERVICES || return 1
                  assert_running_release_identity \
                    "$IMAGE:$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    false disabled false || return 1
                  PORT=\$(grep '^PORT=' .env | cut -d= -f2 | head -1)
                  PORT=\${PORT:-$DEFAULT_PORT}
                  wait_local_health "\$PORT" "protected capture-off" || return 1
                  wait_public_readiness "protected capture-off" || return 1
                  echo "Protected capture-off complete; worker queue remains paused"
                  ;;
                protected-on-bounded)
                  assert_persisted_release_identity || return 1
                  assert_running_release_identity \
                    "$IMAGE:$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    false disabled false || return 1
                  recover_active_drain_id "$PROTECTED_PREDECESSOR_RUN_ID" || return 1
                  PROTECTED_QUEUE_PAUSED=true
                  update_image_tag_env \
                    "$TAG" "$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    true tag true || return 1
                  PROTECTED_MUTATED=true
                  docker compose up -d --no-build --force-recreate \$ALL_SERVICES || return 1
                  assert_running_release_identity \
                    "$IMAGE:$TAG" "$EXPECTED_GIT_SHA" "$EXPECTED_IMAGE_DIGEST" \
                    true tag true || return 1
                  PORT=\$(grep '^PORT=' .env | cut -d= -f2 | head -1)
                  PORT=\${PORT:-$DEFAULT_PORT}
                  wait_local_health "\$PORT" "protected capture-on" || return 1
                  wait_public_readiness "protected capture-on" || return 1
                  run_protected_telemetry_canary || return 1
                  resume_worker_queue "protected release healthy: $TAG" true || return 1
                  PROTECTED_QUEUE_PAUSED=false
                  bounded_protected_canary || return 1
                  echo "Protected capture-on bounded canary complete"
                  ;;
                *)
                  echo "FAIL: invalid protected release mode"
                  return 1
                  ;;
              esac
            }
            # PROTECTED_RELEASE_FLOW_END

            remove_handoff_candidate_upstream() {
              if [ -z "\$HANDOFF_MARKER" ] || [ ! -f "\$HANDOFF_NGINX_SITE" ]; then
                return 0
              fi
              if ! grep -q "\$HANDOFF_MARKER" "\$HANDOFF_NGINX_SITE"; then
                return 0
              fi

              local tmp backup
              tmp=\$(mktemp)
              backup=\$(make_handoff_nginx_backup "remove")
              grep -v "\$HANDOFF_MARKER" "\$HANDOFF_NGINX_SITE" > "\$tmp"
              mv "\$tmp" "\$HANDOFF_NGINX_SITE"
              if nginx -t; then
                nginx -s reload
                rm -f "\$backup"
                echo "Removed temporary nginx candidate upstream"
              else
                echo "FAIL: nginx config invalid after candidate removal; restoring backup"
                mv "\$backup" "\$HANDOFF_NGINX_SITE"
                nginx -t
                nginx -s reload
                return 1
              fi
            }

            stop_handoff_candidate() {
              if [ -n "\$HANDOFF_CANDIDATE_CONTAINER" ]; then
                docker rm -f "\$HANDOFF_CANDIDATE_CONTAINER" >/dev/null 2>&1 || true
                HANDOFF_CANDIDATE_CONTAINER=""
              fi
            }

            cleanup_handoff_candidate() {
              remove_handoff_candidate_upstream || true
              stop_handoff_candidate
            }

            make_handoff_nginx_backup() {
              local suffix="\$1"
              mkdir -p "\$HANDOFF_NGINX_BACKUP_DIR"
              local backup="\$HANDOFF_NGINX_BACKUP_DIR/gamehunter.f1-443.$DEPLOY_RUN_ID.\$suffix.bak"
              cp "\$HANDOFF_NGINX_SITE" "\$backup"
              echo "\$backup"
            }

            add_handoff_candidate_upstream() {
              local upstream_name="\$1"
              local canonical_port="\$2"
              local candidate_port="\$3"
              local tmp backup

              HANDOFF_MARKER="gh-deploy-candidate:$SERVICE:$DEPLOY_RUN_ID"
              if grep -q "\$HANDOFF_MARKER" "\$HANDOFF_NGINX_SITE"; then
                return 0
              fi

              tmp=\$(mktemp)
              awk -v upstream="upstream \$upstream_name" \
                -v canonical_port="\$canonical_port" \
                -v candidate_port="\$candidate_port" \
                -v marker="\$HANDOFF_MARKER" '
                \$0 ~ "^[[:space:]]*" upstream "[[:space:]]*\\\\{" { in_block=1 }
                in_block && \$0 ~ "server 127\\\\.0\\\\.0\\\\.1:" canonical_port "[[:space:]]" && inserted == 0 {
                  print
                  print "    server 127.0.0.1:" candidate_port " max_fails=0; # " marker
                  inserted=1
                  next
                }
                in_block && \$0 ~ "^[[:space:]]*\\\\}" { in_block=0 }
                { print }
                END { if (inserted != 1) exit 42 }
              ' "\$HANDOFF_NGINX_SITE" > "\$tmp"

              backup=\$(make_handoff_nginx_backup "add")
              mv "\$tmp" "\$HANDOFF_NGINX_SITE"
              if nginx -t; then
                nginx -s reload
                rm -f "\$backup"
                echo "Added temporary nginx candidate upstream 127.0.0.1:\$candidate_port to \$upstream_name"
              else
                echo "FAIL: nginx config invalid with candidate upstream; restoring backup"
                mv "\$backup" "\$HANDOFF_NGINX_SITE"
                nginx -t
                nginx -s reload
                return 1
              fi
            }

            find_handoff_candidate_port() {
              local base_port="\$1"
              local port=\$(( base_port + 10000 ))
              while ( : >/dev/tcp/127.0.0.1/\$port ) >/dev/null 2>&1; do
                port=\$(( port + 1 ))
              done
              echo "\$port"
            }

            prepare_public_handoff() {
              if [ "\$PUBLIC_CHECKS" = "none" ]; then
                return 0
              fi
              if [ "$SERVICE" != "backend" ] && [ "$SERVICE" != "frontend" ]; then
                return 0
              fi
              if [ ! -f "\$HANDOFF_NGINX_SITE" ]; then
                echo "FAIL: nginx site config not found at \$HANDOFF_NGINX_SITE"
                return 1
              fi

              local upstream_name candidate_port
              upstream_name="gamehunter_$SERVICE"
              candidate_port=\$(find_handoff_candidate_port "$DEFAULT_PORT")
              HANDOFF_CANDIDATE_PORT="\$candidate_port"
              HANDOFF_CANDIDATE_CONTAINER="gamehunter-$SERVICE-candidate-$DEPLOY_RUN_ID"

              docker rm -f "\$HANDOFF_CANDIDATE_CONTAINER" >/dev/null 2>&1 || true
              echo "Starting $SERVICE candidate on localhost:\$HANDOFF_CANDIDATE_PORT before canonical recreate"
              docker compose run -d --name "\$HANDOFF_CANDIDATE_CONTAINER" --no-deps \
                -e PORT="\$HANDOFF_CANDIDATE_PORT" \
                "$SERVICE" >/dev/null

              if ! wait_local_health "\$HANDOFF_CANDIDATE_PORT" "candidate $TAG"; then
                echo "FAIL: candidate health failed before public handoff"
                docker logs --tail=80 "\$HANDOFF_CANDIDATE_CONTAINER" 2>/dev/null || true
                return 1
              fi
              if ! wait_candidate_direct_readiness; then
                echo "FAIL: candidate direct readiness failed before public handoff"
                docker logs --tail=80 "\$HANDOFF_CANDIDATE_CONTAINER" 2>/dev/null || true
                return 1
              fi

              add_handoff_candidate_upstream "\$upstream_name" "$DEFAULT_PORT" "\$HANDOFF_CANDIDATE_PORT"
              wait_public_readiness "candidate pool"
            }

            rollback_service() {
              local reason="\$1"
              echo "FAIL: \$reason -- auto-rolling back"
              export IMAGE_TAG=rollback
              if [ "$RELEASE_IDENTITY_ENABLED" = "true" ]; then
                resolve_release_identity "$IMAGE:rollback" "\$ROLLBACK_RELEASE_TAG"
                update_image_tag_env "\$IMAGE_TAG" "\$GH_RELEASE_TAG" "\$GH_GIT_SHA" "\$GH_IMAGE_DIGEST"
              else
                update_image_tag_env "\$IMAGE_TAG"
              fi
              docker compose up -d --no-build --force-recreate \$ALL_SERVICES

              PORT=\$(grep "^PORT=" .env | cut -d= -f2 | head -1)
              PORT=\${PORT:-$DEFAULT_PORT}
              wait_local_health "\$PORT" "rollback" || true
              remove_handoff_candidate_upstream || true
              wait_public_readiness "rollback" || true
              stop_handoff_candidate
              resume_worker_queue "deploy failed after rollback"
              docker logout ghcr.io
              exit 1
            }

            SHOULD_DRAIN_WORKERS=false
            if [ "$WORKER_DRAIN_ENABLED" = "true" ] && printf ' %s ' "\$ALL_SERVICES" | grep -q ' workers '; then
              SHOULD_DRAIN_WORKERS=true
            fi

            if [ "$CUTOVER_MODE" != "standard" ]; then
              trap 'status=\$?; cleanup_protected_canary_runtime; cleanup_env_tmp; exit \$status' EXIT
              if run_protected_release_flow; then
                docker logout ghcr.io
                exit 0
              fi
              PROTECTED_FAILURE_STATUS=1
              contain_protected_failure || PROTECTED_FAILURE_STATUS=\$?
              docker logout ghcr.io || true
              exit "\$PROTECTED_FAILURE_STATUS"
            fi

            trap 'status=\$?; cleanup_env_tmp; if [ \$status -ne 0 ]; then resume_worker_queue "deploy workflow failed before completion"; cleanup_handoff_candidate; fi; exit \$status' EXIT

            if [ "\$SHOULD_DRAIN_WORKERS" = "true" ]; then
              start_worker_drain
            fi

            prepare_public_handoff
            docker compose up -d --no-build --force-recreate \$ALL_SERVICES

            PORT=\$(grep "^PORT=" .env | cut -d= -f2 | head -1)
            PORT=\${PORT:-$DEFAULT_PORT}
            if ! wait_local_health "\$PORT" "canonical $TAG"; then
              rollback_service "canonical health failed after 60s"
            fi

            if ! wait_public_readiness "candidate pool"; then
              rollback_service "public readiness failed while candidate protected the upstream"
            fi

            remove_handoff_candidate_upstream
            if ! wait_public_readiness "canonical upstream"; then
              if [ -n "\$HANDOFF_CANDIDATE_PORT" ]; then
                add_handoff_candidate_upstream "gamehunter_$SERVICE" "$DEFAULT_PORT" "\$HANDOFF_CANDIDATE_PORT" || true
              fi
              rollback_service "canonical public readiness failed after candidate removal"
            fi

            stop_handoff_candidate
            resume_worker_queue "deploy healthy: $TAG" true
            docker logout ghcr.io
            exit 0

          EOF

      - name: Purge Cloudflare cache (full)
        if: success() && inputs.purge-cf
        env:
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          if [ -z "$REVALIDATE_TOKEN" ]; then
            echo "Aviso: REVALIDATE_TOKEN nao configurado, pulando CF purge"
            exit 0
          fi
          curl -fsS -X POST https://gamehunter.com.br/ops/purge \
            -H "Authorization: Bearer $REVALIDATE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'
          echo "OK CF purge via Worker"

      - name: Notify summary
        if: always()
        run: |
          echo "## Deploy ${{ job.status }} (${{ inputs.service-name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Cutover: \`${{ inputs.cutover-mode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Current run ID: \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Protected-off predecessor run: \`${{ inputs.protected-predecessor-run-id || 'n/a' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Git SHA: \`${{ steps.tag.outputs.git_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest esperado: \`${{ steps.tag.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- VPS: ${{ inputs.vps-host }} (${{ inputs.vps-path }})" >> $GITHUB_STEP_SUMMARY
          echo "- Service(s): ${{ inputs.service-name }} ${{ inputs.extra-services }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy workers: ${{ steps.worker-mode.outputs.mode }} (${{ steps.worker-mode.outputs.reason }}); drain: ${{ inputs.worker-drain-enabled }} (${{ inputs.worker-drain-timeout-minutes }} min)" >> $GITHUB_STEP_SUMMARY
          echo "- Health: localhost:${{ inputs.default-port }}${{ inputs.health-path }}" >> $GITHUB_STEP_SUMMARY
